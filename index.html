<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LotoData Nicaragua</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.contenedor{
    max-width:400px;
    margin:40px auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#38bdf8;
}

select,input,button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    font-weight:bold;
}

#resultado{
    margin-top:25px;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="contenedor">

<h1>LotoData Nicaragua</h1>

<select>
<option>Jugá 3</option>
<option>Loto Diaria</option>
</select>

<input
id="numero"
type="text"
maxlength="3"
placeholder="Escribe un número">

<button onclick="buscar()">
Buscar
</button>

<div id="resultado">
Aquí aparecerá el resultado.
</div>

</div>

<script>
    async function buscar() {

    const numero = document.getElementById("numero").value.trim();

    const respuesta = await fetch("./datos.json");
    const datos = await respuesta.json();

    const encontrado = datos.find(item => item.numero === numero);

    const resultado = document.getElementById("resultado");

    if (encontrado) {
        resultado.innerHTML = `
        <h2>${encontrado.numero}</h2>
        <p><b>Última vez:</b> ${encontrado.fecha}</p>
        <p><b>Hora:</b> ${encontrado.hora}</p>
        <p><b>Veces que ha salido:</b> ${encontrado.veces}</p>
        `;
    } else {
        resultado.innerHTML = `
        <h2>No encontrado</h2>
        <p>Ese número no está en la base de datos.</p>
        `;
    }

    }

</script>
</body>
</html>
